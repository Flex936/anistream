name: Build and Release AniStream

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # 1. Standard Linux (Compatible with Ubuntu, Mint, Debian, etc.)
          - os: ubuntu-latest
            platform: linux/amd64
            name: anistream-linux-amd64
            build_flags: "-tags webkit2_41"
            go_amd: "v1" 

          # 2. CachyOS / Arch Optimized (Requires AVX2 CPU, extremely fast)
          - os: ubuntu-latest
            platform: linux/amd64
            name: anistream-cachyos-amd64-v3
            build_flags: "-tags webkit2_41"
            go_amd: "v3" 

          # 3. Windows
          - os: windows-latest
            platform: windows/amd64
            name: anistream-windows-amd64.exe
            build_flags: ""
            go_amd: "v1"

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Setup Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # Notice the added 'env' block here to pass the v3 optimization to Go!
      - name: Build Wails App
        env:
          GOAMD64: ${{ matrix.go_amd }}
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.build_flags }}

      - name: Rename Binary
        run: |
          cd build/bin
          mv * ${{ matrix.name }}
        shell: bash

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: build/bin/${{ matrix.name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
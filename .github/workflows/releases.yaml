name: Build and Release AniStream

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true # Speeds up future builds

      # ─── LINUX SPECIFIC ──────────────────────────────────────────────
      - name: Install Linux Build Dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgtk-3-dev pkg-config

      - name: Get Flutter Packages
        run: flutter pub get

      - name: Build Linux Release
        if: matrix.os == 'ubuntu-latest'
        run: |
          flutter build linux --release
          cd build/linux/x64/release/bundle
          tar -czvf ../../../../../anistream-linux-x64.tar.gz *

      # ─── WINDOWS SPECIFIC ────────────────────────────────────────────
      - name: Build Windows Release
        if: matrix.os == 'windows-latest'
        run: |
          flutter build windows --release
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath anistream-windows-x64.zip

      # ─── MACOS SPECIFIC ──────────────────────────────────────────────
      - name: Build macOS Release
        if: matrix.os == 'macos-latest'
        run: |
          flutter build macos --release
          cd build/macos/Build/Products/Release
          tar -czvf ../../../../../anistream-macos-x64.tar.gz *.app

      # ─── UPLOAD TO GITHUB RELEASES ───────────────────────────────────
      - name: Attach Assets to Release
        uses: softprops/action-gh-release@v2
        with:
          # Automatically attaches whichever artifact was generated by this specific runner
          files: |
            anistream-linux-x64.tar.gz
            anistream-windows-x64.zip
            anistream-macos-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
